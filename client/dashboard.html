<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
   
    background: #e6ecf7;
    display: flex;
    justify-content: center;
    margin-top: 15%;
}


.container {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}


h2 {
    text-align: center;
    margin-bottom: 15px;
}


.input-box {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

input:focus {
    outline: none;
    border: 1px solid #4f46e5;
    box-shadow: 0 0 5px rgba(79,70,229,0.3);
}


button {
    padding: 10px;
    border: none;
    background: #4f46e5;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #4338ca;
}


ul {
    list-style: none;
    padding: 0;
    margin-top: 15px;
}

li {
    background: #f1f5f9;
    padding: 10px;
    margin: 5px 0;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}




</style>
</head>

<body>

<div class="container">
    <h2> Task Manager</h2>

    <div class="input-box">
        <input id="taskInput" placeholder="Enter a task">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script src="dashboard.js"></script>

</body>
</html>
